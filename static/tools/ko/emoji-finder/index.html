// ── 상태 ──────────────────────────────────────────
var currentCat = 'all';
var searchQuery = '';
var recentEmojis = [];

try { recentEmojis = JSON.parse(localStorage.getItem('guh-recent-emoji') || '[]'); } catch(e){}

// ── 초기화 ────────────────────────────────────────
function init() {
  renderCats();
  renderRecent();
  renderGrid();
}

// ── 카테고리 탭 렌더링 ────────────────────────────
function renderCats() {
  var wrap = document.getElementById('cat-tabs');
  wrap.innerHTML = CATS.map(function(c) {
    return '<button class="cat-tab' + (c.id === currentCat ? ' active' : '') + '" onclick="setCat(\'' + c.id + '\')">' +
      c.icon + ' ' + c.label + '</button>';
  }).join('');
}

function setCat(id) {
  currentCat = id;
  renderCats();
  renderGrid();
}

// ── 검색 ──────────────────────────────────────────
function onSearch(q) {
  searchQuery = q.trim().toLowerCase();
  renderGrid();
}

// ── 이모지 필터링 ─────────────────────────────────
function filterEmojis() {
  return EMOJIS.filter(function(e) {
    var catMatch = (currentCat === 'all' || e[2] === currentCat);
    var searchMatch = !searchQuery || e[1].toLowerCase().indexOf(searchQuery) !== -1 || e[0] === searchQuery;
    return catMatch && searchMatch;
  });
}

// ── 그리드 렌더링 ─────────────────────────────────
function renderGrid() {
  var list = filterEmojis();
  var grid = document.getElementById('emoji-grid');
  document.getElementById('emoji-count').textContent = list.length + '개의 이모지';

  if (!list.length) {
    grid.innerHTML = '<div class="emoji-empty">검색 결과가 없습니다 🔍</div>';
    return;
  }

  grid.innerHTML = list.map(function(e) {
    return '<div class="emoji-card" onclick="copyEmoji(\'' + e[0].replace(/'/g, "\\'") + '\')" title="' + e[1] + '">' +
      '<span class="emoji-char">' + e[0] + '</span>' +
      '<span class="emoji-name">' + e[1] + '</span>' +
      '</div>';
  }).join('');
}

// ── 복사 ──────────────────────────────────────────
function copyEmoji(emoji) {
  navigator.clipboard.writeText(emoji).then(function() {
    showToast(emoji + ' 복사됨!', false);
    addRecent(emoji);
    // 카드 복사 애니메이션
    var cards = document.querySelectorAll('.emoji-card');
    for (var i = 0; i < cards.length; i++) {
      if (cards[i].querySelector('.emoji-char').textContent === emoji) {
        var card = cards[i];
        card.classList.add('copied');
        setTimeout(function() { card.classList.remove('copied'); }, 600);
        break;
      }
    }
  }).catch(function() {
    // 폴백
    var ta = document.createElement('textarea');
    ta.value = emoji;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(emoji + ' 복사됨!', false);
    addRecent(emoji);
  });
}

// ── 최근 복사 ─────────────────────────────────────
function addRecent(emoji) {
  recentEmojis = recentEmojis.filter(function(e) { return e !== emoji; });
  recentEmojis.unshift(emoji);
  if (recentEmojis.length > 12) recentEmojis = recentEmojis.slice(0, 12);
  try { localStorage.setItem('guh-recent-emoji', JSON.stringify(recentEmojis)); } catch(e) {}
  renderRecent();
}

function renderRecent() {
  var row = document.getElementById('recent-row');
  var wrap = document.getElementById('recent-emojis');
  if (!recentEmojis.length) { row.style.display = 'none'; return; }
  row.style.display = 'flex';
  wrap.innerHTML = recentEmojis.map(function(e) {
    return '<span class="recent-chip" onclick="copyEmoji(\'' + e.replace(/'/g, "\\'") + '\')" title="' + e + '">' + e + '</span>';
  }).join('');
}

function showToast(msg,isErr){var t=document.getElementById('toast');t.textContent=msg;t.style.background=isErr?'var(--red)':'var(--green)';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800);}

init();
</script>
