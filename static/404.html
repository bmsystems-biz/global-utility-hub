<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | EveryUtil</title>
  <meta name="description" content="The page you are looking for could not be found." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Poppins:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/common.css?v=2" />
  <script>(function(){var t=localStorage.getItem('GUH-theme');if(t)document.documentElement.dataset.theme=t;else if(window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.dataset.theme='dark';})();</script>
  <style>
    .e404-wrap { text-align: center; padding: 80px 20px 60px; }
    .e404-code {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(80px, 20vw, 140px);
      font-weight: 700;
      line-height: 1;
      margin: 0 0 8px;
      background: linear-gradient(79deg, #1fbc9a 0%, #9156fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .e404-title { font-size: clamp(18px, 4vw, 26px); font-weight: 600; color: var(--text-1); margin: 0 0 12px; }
    .e404-desc { font-size: 15px; color: var(--text-2); line-height: 1.8; max-width: 440px; margin: 0 auto 32px; }
    .e404-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .e404-btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; background: var(--accent); color: #fff; border-radius: 12px; font-size: 15px; font-weight: 600; text-decoration: none; transition: opacity .2s; }
    .e404-btn-primary:hover { opacity: .88; color: #fff; text-decoration: none; }
    .e404-btn-secondary { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; background: var(--surface2); color: var(--text-1); border-radius: 12px; font-size: 15px; font-weight: 600; text-decoration: none; border: 1px solid var(--border); transition: opacity .2s; }
    .e404-btn-secondary:hover { opacity: .8; text-decoration: none; }
    .e404-divider { margin: 48px auto; max-width: 360px; border: none; border-top: 1px solid var(--border); }
    .e404-tools-label { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); margin-bottom: 16px; }
    .e404-tool-links { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .e404-tool-link { font-size: 13px; color: var(--accent); text-decoration: none; padding: 6px 14px; border: 1px solid var(--border); border-radius: 100px; background: var(--surface); transition: background .15s; }
    .e404-tool-link:hover { background: var(--surface2); text-decoration: none; }
  </style>
</head>
<body>

<header class="guh-header" role="banner">
  <div class="guh-header-inner">
    <button class="guh-menu-btn" id="menu-btn" aria-label="Menu">☰</button>
    <a href="/" class="guh-logo" id="home-link" style="display:inline-flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-weight:500;">
      <img src="/assets/img/logo_100.png" alt="EveryUtil" style="height:1em;width:1em;object-fit:contain;" />
      <span>
        <span style="color:var(--guh-logo-every);">Every</span><span style="background:linear-gradient(79deg,#1fbc9a 0%,#9156fb 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Util</span>
      </span>
    </a>
    <nav class="guh-nav" id="main-nav" aria-label="Main navigation"></nav>
    <div class="guh-header-actions">
      <div class="guh-lang-select">
        <a href="/ko/" class="guh-lang-btn" id="lang-ko">KO</a>
        <a href="/en/" class="guh-lang-btn" id="lang-en">EN</a>
      </div>
      <button class="guh-theme-btn" onclick="guhToggleTheme()" aria-label="Toggle dark mode"><span id="theme-icon">🌙</span></button>
    </div>
  </div>
</header>

<div class="guh-mobile-nav" id="mobile-nav" role="navigation">
  <a href="/" id="m-home">Home</a>
  <hr/>
  <a href="/ko/">🇰🇷 한국어</a>
  <a href="/en/">🇺🇸 English</a>
</div>

<main class="guh-container" id="main-content">
  <div class="e404-wrap">
    <div class="e404-code">404</div>
    <h1 class="e404-title" id="e404-title">Page Not Found</h1>
    <p class="e404-desc" id="e404-desc">The page you are looking for doesn't exist or has been moved.</p>
    <div class="e404-actions">
      <a href="/" class="e404-btn-primary" id="e404-home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Go Home
      </a>
      <button class="e404-btn-secondary" onclick="history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        <span id="e404-back">Go Back</span>
      </button>
    </div>

    <hr class="e404-divider" />

    <p class="e404-tools-label" id="e404-tools-label">Popular Tools</p>
    <div class="e404-tool-links" id="e404-tool-links"></div>
  </div>
</main>

<footer class="guh-footer" role="contentinfo">
  <div class="guh-footer-inner">
    <a href="/" class="guh-footer-logo" id="footer-logo">EveryUtil</a>
    <nav class="guh-footer-links" id="footer-nav" aria-label="Footer navigation"></nav>
    <p class="guh-footer-copy">© 2026 EveryUtil. All rights reserved.</p>
  </div>
</footer>

<script>
  function guhToggleTheme(){var d=document.documentElement.dataset.theme==='dark';document.documentElement.dataset.theme=d?'light':'dark';localStorage.setItem('GUH-theme',document.documentElement.dataset.theme);document.getElementById('theme-icon').textContent=d?'🌙':'☀️';}
  (function(){document.getElementById('theme-icon').textContent=document.documentElement.dataset.theme==='dark'?'☀️':'🌙';})();
  document.getElementById('menu-btn').addEventListener('click',function(){document.getElementById('mobile-nav').classList.toggle('open');});
  document.querySelectorAll('#mobile-nav a').forEach(function(l){l.addEventListener('click',function(){document.getElementById('mobile-nav').classList.remove('open');});});

  (function () {
    var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase().startsWith('ko') ? 'ko' : 'en';
    var root = '/' + lang + '/';

    document.documentElement.lang = lang;
    document.getElementById('home-link').href = root;
    document.getElementById('e404-home').href = root;
    document.getElementById('footer-logo').href = root;
    document.getElementById('m-home').href = root;

    document.getElementById('lang-' + lang).classList.add('active');

    var KO = lang === 'ko';

    document.getElementById('e404-title').textContent = KO ? '페이지를 찾을 수 없습니다' : 'Page Not Found';
    document.getElementById('e404-desc').textContent = KO
      ? '요청하신 페이지가 존재하지 않거나 이동되었습니다.'
      : "The page you are looking for doesn't exist or has been moved.";
    document.getElementById('e404-home').querySelector('span') && (document.getElementById('e404-home').lastChild.textContent = KO ? '홈으로 이동' : 'Go Home');
    document.getElementById('e404-back').textContent = KO ? '이전 페이지' : 'Go Back';
    document.getElementById('e404-tools-label').textContent = KO ? '인기 도구' : 'Popular Tools';
    document.getElementById('e404-home').childNodes[2].textContent = ' ' + (KO ? '홈으로 이동' : 'Go Home');

    var nav = document.getElementById('main-nav');
    var links = KO
      ? [['#image-tools','이미지도구'],['#daily-tools','생활도구'],['#file-tools','파일도구'],['#finance','금융계산기'],['#health','건강'],['#dev-tools','개발자도구']]
      : [['#image-tools','Image Tools'],['#daily-tools','Daily Tools'],['#file-tools','File Tools'],['#finance','Finance'],['#health','Health'],['#dev-tools','Dev Tools']];
    nav.innerHTML = links.map(function(l){return '<a href="'+root+l[0]+'" class="guh-nav-link">'+l[1]+'</a>';}).join('');

    var footerNav = document.getElementById('footer-nav');
    footerNav.innerHTML = KO
      ? '<a href="'+root+'about/">소개</a><a href="'+root+'blog/">블로그</a><a href="'+root+'">도구 목록</a><a href="mailto:contact@bmsystems.biz">Contact</a>'
      : '<a href="'+root+'about/">About</a><a href="'+root+'blog/">Blog</a><a href="'+root+'">All Tools</a><a href="mailto:contact@bmsystems.biz">Contact</a>';

    var toolLinks = KO
      ? [['이미지 변환기','/tools/ko/image-converter/'],['ZIP 압축해제','/tools/ko/zip-extractor/'],['QR코드 생성기','/tools/ko/qr-code-generator/'],['BMI 계산기','/tools/ko/bmi-calculator/'],['날짜 계산기','/tools/ko/date-calculator/'],['JSON 포매터','/tools/ko/json-formatter/']]
      : [['Image Converter','/tools/en/image-converter/'],['ZIP Extractor','/tools/en/zip-extractor/'],['QR Code Generator','/tools/en/qr-code-generator/'],['BMI Calculator','/tools/en/bmi-calculator/'],['Date Calculator','/tools/en/date-calculator/'],['JSON Formatter','/tools/en/json-formatter/']];

    document.getElementById('e404-tool-links').innerHTML = toolLinks.map(function(t){
      return '<a href="'+t[1]+'" class="e404-tool-link">'+t[0]+'</a>';
    }).join('');
  })();
</script>
<script src="/assets/js/guh-search.js?v=2" defer></script>
</body>
</html>
