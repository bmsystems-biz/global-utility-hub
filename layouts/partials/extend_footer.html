<footer style="border-top:1px solid var(--border);margin-top:2rem;padding:1.5rem 0;text-align:center;font-size:0.85rem;color:#888;">
  <nav style="display:flex;flex-wrap:wrap;justify-content:center;gap:1rem 1.5rem;margin-bottom:0.75rem;">
    <a href="/about/" style="color:#888;text-decoration:none;">About InvestLab</a>
    <a href="/contact/" style="color:#888;text-decoration:none;">문의하기</a>
    <a href="/privacy/" style="color:#888;text-decoration:none;">개인정보처리방침</a>
    <a href="/terms/" style="color:#888;text-decoration:none;">이용약관</a>
    <a href="/cookies/" style="color:#888;text-decoration:none;">쿠키정책</a>
  </nav>
  <p style="margin:0;">© {{ now.Year }} InvestLab. 본 사이트의 콘텐츠는 정보 제공 목적이며 투자 권유가 아닙니다.</p>
</footer>

<!-- 쿠키 동의 배너 -->
<div id="cookie-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1a1a1a;color:#fff;padding:1rem 1.5rem;box-shadow:0 -2px 12px rgba(0,0,0,0.3);">
  <div style="max-width:900px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:1rem;">
    <p style="margin:0;flex:1;min-width:200px;font-size:0.875rem;line-height:1.5;">
      본 사이트는 서비스 개선 및 맞춤형 광고 제공을 위해 쿠키를 사용합니다.
      <a href="/cookies/" style="color:#93c5fd;text-decoration:underline;">쿠키정책</a> 및
      <a href="/privacy/" style="color:#93c5fd;text-decoration:underline;">개인정보처리방침</a>을 확인하세요.
    </p>
    <div style="display:flex;gap:0.75rem;flex-shrink:0;">
      <button onclick="denyCookies()" style="padding:0.5rem 1.25rem;border:1px solid #555;background:transparent;color:#ccc;border-radius:6px;cursor:pointer;font-size:0.875rem;">거부</button>
      <button onclick="acceptCookies()" style="padding:0.5rem 1.25rem;border:none;background:#2563eb;color:#fff;border-radius:6px;cursor:pointer;font-size:0.875rem;font-weight:600;">동의합니다</button>
    </div>
  </div>
</div>

<script>
(function() {
  var consent = localStorage.getItem('cookie-consent');
  if (!consent) {
    document.getElementById('cookie-banner').style.display = 'block';
  }
})();

function acceptCookies() {
  localStorage.setItem('cookie-consent', 'accepted');
  document.getElementById('cookie-banner').style.display = 'none';
}

function denyCookies() {
  localStorage.setItem('cookie-consent', 'denied');
  document.getElementById('cookie-banner').style.display = 'none';
}
</script>
