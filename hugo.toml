baseURL = "https://util.bmsystems.biz/"
title   = "Global Utility Hub"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = true

[languages]
  [languages.ko]
    contentDir   = "content/ko"
    label        = "한국어"
    weight = 1
    title  = "글로벌 유틸리티 허브"
    [languages.ko.params]
      description = "전 세계 사용자를 위한 유틸리티 플랫폼"
      locale      = "ko-KR"
  [languages.en]
    contentDir   = "content/en"
    label        = "English"
    weight = 2
    title  = "Global Utility Hub"
    [languages.en.params]
      description = "Utility Platform for global users"
      locale      = "en-US"

[params]
  author = "Global Utility Hub"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS", "JSON"]
  page    = ["HTML"]
