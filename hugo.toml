baseURL = "https://util.bmsystems.biz/"
title   = "Global Utility Hub"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = true

[languages]
  [languages.ko]
    languageName = "한국어"
    languageCode = "ko-KR"
    weight = 1
    title  = "글로벌 유틸리티 허브"
    [languages.ko.params]
      description = "전 세계 사용자를 위한 SEO 중심 유틸리티 플랫폼"
  [languages.en]
    languageName = "English"
    languageCode = "en-US"
    weight = 2
    title  = "Global Utility Hub"
    [languages.en.params]
      description = "SEO-focused Utility Platform for global users"

[params]
  author = "Global Utility Hub"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page    = ["HTML"]
