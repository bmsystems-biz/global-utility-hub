baseURL = "https://util.bmsystems.biz/"
locale = "ko-KR"
title = "InvestLab"
theme = "PaperMod"
defaultContentLanguage = "ko"
enableRobotsTXT = true
buildDrafts = false
buildFuture = true

[pagination]
  pagerSize = 10

[params]
  env = "production"
  title = "InvestLab"
  description = "투자 재테크 정보 블로그"
  author = "InvestLab"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = false
  comments = false

  [params.homeInfoParams]
    Title = "InvestLab"
    Content = "최신 투자 재테크 정보와 시장 트렌드"

  [params.socialIcons]

[menu]
  [[menu.main]]
    identifier = "home"
    name = "홈"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "posts"
    name = "전체 아티클"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    identifier = "cat-생활도구"
    name = "생활도구"
    url = "/categories/생활도구/"
    weight = 10
  [[menu.main]]
    identifier = "cat-금융-계산기"
    name = "금융 계산기"
    url = "/categories/금융-계산기/"
    weight = 11
  [[menu.main]]
    identifier = "cat-건강"
    name = "건강"
    url = "/categories/건강/"
    weight = 12
  [[menu.main]]
    identifier = "cat-개발자도구"
    name = "개발자도구"
    url = "/categories/개발자도구/"
    weight = 13
  [[menu.main]]
    identifier = "cat-파일도구"
    name = "파일도구"
    url = "/categories/파일도구/"
    weight = 14

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"
