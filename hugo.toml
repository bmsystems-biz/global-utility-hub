baseURL = "https://util.bmsystems.biz/"
title   = "EveryUtil"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = true

[languages]
  [languages.ko]
    contentDir   = "content/ko"
    label        = "한국어"
    weight = 1
    title  = "EveryUtil"
    [languages.ko.params]
      description = "Every Tool. Everywhere. Every Device. — 전 세계 누구나 브라우저 하나로 필요한 도구를 즉시 사용하세요."
      locale      = "ko-KR"
  [languages.en]
    contentDir   = "content/en"
    label        = "English"
    weight = 2
    title  = "EveryUtil"
    [languages.en.params]
      description = "Every Tool. Everywhere. Every Device. — Everything You Need. One Utility Hub."
      locale      = "en-US"

[params]
  author = "EveryUtil"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS", "JSON"]
  page    = ["HTML"]
